name: 测试编译

on:
  push:
    paths:
      - '.github/workflows/test-compile.yml'
      - 'AgentBridgeStandalone/**'
  workflow_dispatch:

jobs:
  test-compile:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: 安装依赖
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq cmake libssl-dev 2>&1 | tail -5
        echo "=== 安装完成 ==="
        cmake --version | head -1
        openssl version

    - name: 列出文件
      run: |
        echo "=== AgentBridgeStandalone 目录 ==="
        ls -la AgentBridgeStandalone/
        echo "=== CMakeLists.txt 内容 ==="
        cat AgentBridgeStandalone/CMakeLists.txt

    - name: 配置 CMake
      run: |
        mkdir -p build
        cd build
        cmake ../AgentBridgeStandalone -DCMAKE_BUILD_TYPE=Release 2>&1 | tee ../cmake-log.txt
        echo "=== CMake 配置完成 ==="

    - name: 编译
      run: |
        cd build
        make -j$(nproc) 2>&1 | tee ../build-log.txt
        echo "=== 编译完成 ==="

    - name: 输出错误日志
      if: failure()
      run: |
        echo "=== CMake 日志 ==="
        cat cmake-log.txt 2>/dev/null || echo "无 CMake 日志"
        echo ""
        echo "=== 编译日志 ==="
        cat build-log.txt 2>/dev/null || echo "无编译日志"

    - name: 上传编译日志
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: |
          cmake-log.txt
          build-log.txt
        retention-days: 7

    - name: 运行测试
      if: success()
      run: |
        cd build
        ./AgentBridgeTest &
        sleep 2
        curl -s http://localhost:8080/ || echo "HTTP 测试失败"
        curl -s http://localhost:8080/api/v1/system/info || echo "系统信息测试失败"
        kill %1 2>/dev/null || true
